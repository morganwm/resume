name: Build Resume

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Keys from the overviews dictionary in src/content.typ
        company: [base, temporal, chainguard, overland, gable, stoke]

    env:
      FILE_BASE: morgan_watson-morris_resume

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache fonts
        id: font-cache
        uses: actions/cache@v4
        with:
          path: fonts
          key: tex-gyre-heros-qhv2.004otf

      - name: Download and Unzip Archive
        if: steps.font-cache.outputs.cache-hit != 'true'
        run: |
          # Define variables for clarity
          DOWNLOAD_URL="https://www.gust.org.pl/projects/e-foundry/tex-gyre/heros/qhv2.004otf.zip"
          OUTPUT_FILE="tex-gyre-hero.zip"
          EXTRACT_DIR="fonts"

          # Use curl to download the file to the specified output file
          curl -L "$DOWNLOAD_URL" -o "$OUTPUT_FILE"

          # Create the extraction directory
          mkdir -p "$EXTRACT_DIR"

          # Unzip the archive into the specified directory
          unzip "$OUTPUT_FILE" -d "$EXTRACT_DIR"

          # Optional: Remove the downloaded zip file
          rm "$OUTPUT_FILE"

      - name: Verify extracted files
        run: ls -R fonts

      - name: Install Typst
        uses: typst-community/setup-typst@v2
        with:
          version: latest

      - name: Compile resume
        run: |
          if [ "${{ matrix.company }}" = "base" ]; then
            PDF="${FILE_BASE}.pdf"
          else
            PDF="${FILE_BASE}_${{ matrix.company }}.pdf"
          fi
          echo "PDF=$PDF" >> "$GITHUB_ENV"

          typst compile resume.typ "$PDF" --font-path ./fonts --input company=${{ matrix.company }}

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf-${{ matrix.company }}
          path: ${{ env.PDF }}
          retention-days: 30

      - name: Attach to Release
        if: github.event_name == 'release'
        uses: actions/github-script@v7

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs").promises;
            const { repo: { owner, repo } } = context;

            const release = await github.rest.repos.getReleaseByTag({
              owner, repo,
              tag: process.env.GITHUB_REF.replace("refs/tags/", ""),
            });

            const file = process.env.PDF;

            console.log("Release:", { release });
            console.log("File:", { file })

            await github.rest.repos.uploadReleaseAsset({
              owner, repo,
              release_id: release.data.id,
              name: file,
              data: await fs.readFile(file),
            });
